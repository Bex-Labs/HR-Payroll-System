<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | BexHR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.png" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-xl-5">
          <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <h1 class="h3 fw-bold mb-2" id="pageTitle">Set New Password</h1>
                <p class="text-secondary mb-0" id="pageSubtitle">
                  Complete your password update securely.
                </p>
              </div>

              <div id="resetAlertContainer"></div>

              <form id="resetPasswordForm" novalidate>
                <div class="mb-3">
                  <label for="newPassword" class="form-label fw-semibold">
                    New Password
                  </label>
                  <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">
                      <i class="bi bi-shield-lock"></i>
                    </span>
                    <input
                      type="password"
                      class="form-control border-start-0 border-end-0"
                      id="newPassword"
                      placeholder="Enter new password"
                      required
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="toggleNewPasswordBtn"
                      aria-label="Toggle new password visibility"
                    >
                      <i class="bi bi-eye" id="toggleNewPasswordIcon"></i>
                    </button>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="confirmPassword" class="form-label fw-semibold">
                    Confirm New Password
                  </label>
                  <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">
                      <i class="bi bi-shield-check"></i>
                    </span>
                    <input
                      type="password"
                      class="form-control border-start-0 border-end-0"
                      id="confirmPassword"
                      placeholder="Confirm new password"
                      required
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="toggleConfirmPasswordBtn"
                      aria-label="Toggle confirm password visibility"
                    >
                      <i class="bi bi-eye" id="toggleConfirmPasswordIcon"></i>
                    </button>
                  </div>
                </div>

                <div class="small text-secondary mb-4">
                  Password must be at least 8 characters and include uppercase,
                  lowercase, number, and special character.
                </div>

                <button type="submit" class="btn hr-btn-primary w-100" id="resetSubmitBtn">
                  <i class="bi bi-key me-2"></i>Update Password
                </button>
              </form>

              <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none">Back to Sign In</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/reset-password.js"></script>
  </body>
</html>
